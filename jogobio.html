<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Núcleo em Alerta 🧬</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    text-align: center;
}
.container {
    padding: 20px;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}
button {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 90%;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}
.correct { background-color: #22c55e; }
.wrong { background-color: #ef4444; }
.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="container" id="game">
    <h1>🧬 Núcleo em Alerta</h1>
    <div id="intro">
        <p>Você é o Dr. Bio, um biomédico especialista em mutações genéticas.</p>
        <p>Um surto desconhecido está ameaçando pacientes. Sua missão é diagnosticar corretamente antes que seja tarde!</p>
        <button onclick="startGame()">Iniciar Missão 🚀</button>
    </div>
</div>

<script>
const questions = [
{
    q: "Paciente com muco espesso e dificuldade respiratória. Diagnóstico?",
    a: ["Asma", "Fibrose Cística", "Gripe", "Bronquite"],
    c: 1
},
{
    q: "Mutação que afeta produção de proteínas ocorre em qual estrutura?",
    a: ["Mitocôndria", "Núcleo", "Lisossomo", "Membrana"],
    c: 1
},
{
    q: "Paciente com imunidade baixa. Sistema afetado?",
    a: ["Digestório", "Respiratório", "Imunológico", "Nervoso"],
    c: 2
},
{
    q: "Alteração no DNA pode causar o quê?",
    a: ["Doenças genéticas", "Melhora imunológica", "Nada", "Apenas dor"],
    c: 0
}
];

let index = 0;
let score = 0;
let lives = 3;
let time = 15;
let timer;

function startGame() {
    document.getElementById("game").innerHTML = `
        <div class="top-bar">
            <div>❤️ Vidas: <span id="lives">3</span></div>
            <div>⏱️ Tempo: <span id="time">15</span></div>
        </div>
        <div class="card">
            <h2 id="question"></h2>
            <div id="answers"></div>
        </div>
        <p id="status"></p>
    `;
    loadQuestion();
}

function loadQuestion() {
    clearInterval(timer);
    time = 15;
    document.getElementById("time").innerText = time;

    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;
        if (time === 0) {
            loseLife();
        }
    }, 1000);

    const q = questions[index];
    document.getElementById("question").innerText = q.q;
    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.a.forEach((ans, i) => {
        const btn = document.createElement("button");
        btn.innerText = ans;
        btn.onclick = () => checkAnswer(i);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(i) {
    clearInterval(timer);
    const q = questions[index];

    if (i === q.c) {
        score++;
        document.getElementById("status").innerText = "Diagnóstico correto! ✅";
    } else {
        loseLife();
        document.getElementById("status").innerText = "Diagnóstico incorreto! ❌";
    }

    nextStep();
}

function loseLife() {
    lives--;
    document.getElementById("lives").innerText = lives;
    if (lives <= 0) {
        endGame();
    }
}

function nextStep() {
    setTimeout(() => {
        index++;
        if (index < questions.length && lives > 0) {
            loadQuestion();
            document.getElementById("status").innerText = "";
        } else {
            endGame();
        }
    }, 1200);
}

function endGame() {
    clearInterval(timer);
    let rank = "";
    if (score === questions.length) rank = "Biomédico de Elite 🧬";
    else if (score >= 2) rank = "Em Treinamento 👩‍⚕️";
    else rank = "Precisa Revisar 📚";

    document.getElementById("game").innerHTML = `
        <h1>Fim da Missão</h1>
        <p>Pontuação: ${score}/${questions.length}</p>
        <p>Classificação: ${rank}</p>
        <button onclick="location.reload()">Jogar Novamente 🔄</button>
    `;
}
</script>

</body>
</html>
